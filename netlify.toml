[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── Edge Function: server-side auth gate for the admin panel ──────────────────
# Runs BEFORE the static file is served — no credentials = no HTML.
# Update this path if the admin slug is ever changed in admin-config.json.
[[edge_functions]]
  path = "/digger"
  function = "admin-gate"

[[edge_functions]]
  path = "/aqacontrol2026"
  function = "admin-gate"


# ── Redirect Member Area APIs to Netlify Function ──────────────────────
[[redirects]]
  from   = "/api/deploy"
  to     = "/.netlify/functions/deploy"
  status = 200

[[redirects]]
  from   = "/api/admin-auth"
  to     = "/.netlify/functions/admin-auth"
  status = 200

[[redirects]]
  from   = "/api/schedule"
  to     = "/.netlify/functions/members/schedule"
  status = 200

[[redirects]]
  from   = "/api/verify-token"
  to     = "/.netlify/functions/verify-token"
  status = 200

[[redirects]]
  from   = "/api/member/*"
  to     = "/.netlify/functions/members/member/:splat"
  status = 200

[[redirects]]
  from   = "/api/admin/members/*"
  to     = "/.netlify/functions/members/admin/members/:splat"
  status = 200

[[redirects]]
  from   = "/api/admin/members"
  to     = "/.netlify/functions/members/admin/members"
  status = 200


# ── Redirect old .html URLs → clean URLs (301 permanent) ──────────────────────
# Protects Google-indexed pages, shared links, and bookmarks from 404ing.

[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301

