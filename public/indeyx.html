<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avis AQA - Google Reviews Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 153, 255, 0.08) 0%, transparent 50%);
            animation: backgroundShift 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes backgroundShift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 50px) scale(1.1); }
            66% { transform: translate(50px, -30px) scale(0.95); }
        }

        .reviews-section {
            padding: 6rem 1rem;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        .reviews-container {
            max-width: 1500px;
            margin: 0 auto;
        }

        .reviews-title {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            background: linear-gradient(135deg, #00ffff 0%, #00ccff 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 1rem;
            font-weight: 900;
            letter-spacing: -2px;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(0, 255, 255, 0.6)); }
        }

        .reviews-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 3rem;
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .loading-spinner {
            text-align: center;
            padding: 4rem;
        }

        .spinner {
            border: 4px solid rgba(0, 255, 255, 0.1);
            border-top: 4px solid #00ffff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: linear-gradient(145deg, rgba(255, 50, 50, 0.1), rgba(200, 0, 0, 0.05));
            border: 2px solid rgba(255, 50, 50, 0.3);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            margin: 2rem auto;
            max-width: 600px;
        }

        .reviews-stats {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            margin-bottom: 4rem;
            flex-wrap: wrap;
        }

        .rating-overview {
            text-align: center;
        }

        .rating-number {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 2px 20px rgba(0, 255, 255, 0.6));
        }

        .stars-display {
            font-size: 2rem;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 0.5rem;
        }

        .total-reviews {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            font-weight: 600;
        }

        .google-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .rating-bars {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 280px;
        }

        .rating-bar-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .bar-label {
            color: #FFD700;
            font-weight: 700;
            min-width: 30px;
        }

        .bar-track {
            flex: 1;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            width: 0%;
        }

        .bar-count {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            min-width: 40px;
            text-align: right;
        }

        .reviews-carousel {
            position: relative;
            margin-bottom: 3rem;
        }

        .reviews-track {
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            padding: 2rem 0;
            scrollbar-width: none;
        }

        .reviews-track::-webkit-scrollbar {
            display: none;
        }

        .review-card {
            min-width: 400px;
            max-width: 400px;
            background: linear-gradient(145deg, rgba(0, 30, 60, 0.5), rgba(0, 10, 30, 0.3));
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 30px;
            padding: 2.5rem;
            backdrop-filter: blur(30px);
            scroll-snap-align: start;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .review-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .review-card:hover {
            transform: translateY(-10px);
            border-color: #00ffff;
            box-shadow: 0 20px 60px rgba(0, 255, 255, 0.4);
        }

        .review-card:hover::before {
            transform: scaleX(1);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1.5rem;
        }

        .reviewer-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .reviewer-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ffff, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
        }

        .reviewer-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .reviewer-details h4 {
            color: #00ffff;
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 0.2rem;
        }

        .reviewer-meta {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        .review-stars {
            color: #FFD700;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .review-text {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
        }

        .review-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .review-date {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .carousel-controls {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .carousel-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(0, 153, 255, 0.1));
            border: 2px solid rgba(0, 255, 255, 0.4);
            color: #00ffff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .carousel-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(0, 153, 255, 0.2));
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.4);
        }

        .carousel-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .cache-notice {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .reviews-stats {
                flex-direction: column;
                gap: 2rem;
            }

            .review-card {
                min-width: 300px;
                max-width: 300px;
                padding: 2rem;
            }

            .rating-bars {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <section class="reviews-section">
        <div class="reviews-container">
            <h2 class="reviews-title">Avis de nos Nageurs</h2>
            <p class="reviews-subtitle" id="subtitle">Chargement des avis Google...</p>
            
            <div id="loadingState" class="loading-spinner">
                <div class="spinner"></div>
                <p style="margin-top: 1rem; color: rgba(255,255,255,0.7);">Récupération des avis en direct...</p>
            </div>

            <div id="errorState" class="error-message" style="display: none;">
                <h3 style="color: #ff6b6b; margin-bottom: 1rem;">⚠️ Erreur de chargement</h3>
                <p id="errorMessage" style="color: rgba(255,255,255,0.8);"></p>
                <button onclick="loadReviews()" style="margin-top: 1rem; padding: 0.8rem 2rem; background: #00ffff; color: #000; border: none; border-radius: 15px; cursor: pointer; font-weight: bold;">Réessayer</button>
            </div>

            <div id="reviewsContent" style="display: none;">
                <div class="reviews-stats">
                    <div class="rating-overview">
                        <div class="rating-number" id="avgRating">0.0</div>
                        <div class="stars-display" id="starsDisplay">★★★★★</div>
                        <div class="total-reviews" id="totalReviews">0 avis</div>
                        <div class="google-badge">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            Google Reviews
                        </div>
                    </div>
                    
                    <div class="rating-bars" id="ratingBars">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>

                <div class="reviews-carousel">
                    <div class="reviews-track" id="reviewsTrack">
                        <!-- Reviews will be populated here -->
                    </div>

                    <div class="carousel-controls">
                        <button class="carousel-btn" id="prevBtn" onclick="scrollReviews(-1)">‹</button>
                        <button class="carousel-btn" id="nextBtn" onclick="scrollReviews(1)">›</button>
                    </div>
                </div>

                <div class="cache-notice" id="cacheNotice"></div>
            </div>
        </div>
    </section>

    <script>
        let reviewsData = null;
        let currentScroll = 0;

        // Function to generate stars
        function generateStars(rating) {
            const fullStars = Math.floor(rating);
            const halfStar = rating % 1 >= 0.5;
            let stars = '★'.repeat(fullStars);
            if (halfStar && fullStars < 5) stars += '☆';
            stars += '☆'.repeat(5 - Math.ceil(rating));
            return stars;
        }

        // Function to load reviews from Netlify function
        async function loadReviews() {
            const loadingEl = document.getElementById('loadingState');
            const errorEl = document.getElementById('errorState');
            const contentEl = document.getElementById('reviewsContent');
            
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            contentEl.style.display = 'none';

            try {
                // Replace with your actual Netlify function URL
                const response = await fetch('/.netlify/functions/reviews');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data.success && !data.reviews) {
                    throw new Error(data.error || 'Failed to load reviews');
                }

                reviewsData = data.reviews;
                displayReviews(reviewsData, data.cached);
                
                loadingEl.style.display = 'none';
                contentEl.style.display = 'block';

            } catch (error) {
                console.error('Error loading reviews:', error);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                document.getElementById('errorMessage').textContent = 
                    `Impossible de charger les avis: ${error.message}. Affichage des données de démonstration.`;
                
                // Load mock data as fallback
                setTimeout(() => {
                    errorEl.style.display = 'none';
                    contentEl.style.display = 'block';
                    displayReviews(getMockData(), false);
                }, 2000);
            }
        }

        // Function to display reviews
        function displayReviews(data, cached = false) {
            // Update subtitle
            const subtitle = document.getElementById('subtitle');
            subtitle.textContent = `${data.totalReviews} avis vérifiés depuis Google`;

            // Update rating overview
            document.getElementById('avgRating').textContent = data.averageRating.toFixed(1);
            document.getElementById('starsDisplay').textContent = generateStars(data.averageRating);
            document.getElementById('totalReviews').textContent = `${data.totalReviews} avis vérifiés`;

            // Update rating bars
            const barsContainer = document.getElementById('ratingBars');
            barsContainer.innerHTML = '';
            
            const distribution = data.ratingDistribution || [2, 3, 10, 42, 467];
            const total = distribution.reduce((a, b) => a + b, 0);
            
            for (let i = 4; i >= 0; i--) {
                const count = distribution[i];
                const percentage = total > 0 ? (count / total * 100) : 0;
                
                barsContainer.innerHTML += `
                    <div class="rating-bar-row">
                        <span class="bar-label">${i + 1}★</span>
                        <div class="bar-track">
                            <div class="bar-fill" data-width="${percentage}"></div>
                        </div>
                        <span class="bar-count">${count}</span>
                    </div>
                `;
            }

            // Animate bars
            setTimeout(() => {
                document.querySelectorAll('.bar-fill').forEach(bar => {
                    bar.style.width = bar.dataset.width + '%';
                });
            }, 300);

            // Display review cards
            const trackEl = document.getElementById('reviewsTrack');
            trackEl.innerHTML = '';
            
            data.reviews.forEach(review => {
                const card = document.createElement('div');
                card.className = 'review-card';
                card.innerHTML = `
                    <div class="review-header">
                        <div class="reviewer-info">
                            <div class="reviewer-avatar">
                                ${review.profilePhotoUrl ? 
                                    `<img src="${review.profilePhotoUrl}" alt="${review.authorName}">` : 
                                    review.authorInitial}
                            </div>
                            <div class="reviewer-details">
                                <h4>${review.authorName}</h4>
                                <p class="reviewer-meta">Avis Google vérifié</p>
                            </div>
                        </div>
                        <div class="review-stars">${generateStars(review.rating)}</div>
                    </div>
                    <p class="review-text">${review.text}</p>
                    <div class="review-footer">
                        <span class="review-date">${review.relativeTime}</span>
                    </div>
                `;
                trackEl.appendChild(card);
            });

            // Update cache notice
            const cacheNotice = document.getElementById('cacheNotice');
            if (cached) {
                cacheNotice.textContent = '💾 Données en cache - Dernière mise à jour il y a moins d\'une heure';
            } else {
                cacheNotice.textContent = '✓ Données fraîches de Google Maps';
            }
        }

        // Scroll reviews carousel
        function scrollReviews(direction) {
            const track = document.getElementById('reviewsTrack');
            const cardWidth = 420; // card width + gap
            currentScroll += direction * cardWidth;
            currentScroll = Math.max(0, Math.min(currentScroll, track.scrollWidth - track.clientWidth));
            
            track.scrollTo({
                left: currentScroll,
                behavior: 'smooth'
            });
        }

        // Mock data fallback
        function getMockData() {
            return {
                averageRating: 4.9,
                totalReviews: 524,
                ratingDistribution: [2, 3, 10, 42, 467],
                reviews: [
                    {
                        authorName: "Sarah M.",
                        authorInitial: "S",
                        rating: 5,
                        text: "Une expérience incroyable! Les coachs sont professionnels et attentifs. J'ai progressé bien plus vite que je ne l'aurais imaginé.",
                        relativeTime: "il y a 2 jours"
                    },
                    {
                        authorName: "Mohamed K.",
                        authorInitial: "M",
                        rating: 5,
                        text: "Excellent rapport qualité-prix! Les horaires sont flexibles et les piscines sont toujours propres.",
                        relativeTime: "il y a 5 jours"
                    },
                    {
                        authorName: "Leila B.",
                        authorInitial: "L",
                        rating: 5,
                        text: "J'avais peur de l'eau depuis toujours. Grâce à l'équipe AQA, j'ai vaincu ma phobie et maintenant je nage régulièrement.",
                        relativeTime: "il y a 1 semaine"
                    },
                    {
                        authorName: "Ahmed F.",
                        authorInitial: "A",
                        rating: 5,
                        text: "Les séances Aqua Fitness sont géniales! J'ai perdu 12kg en 5 mois. Les équipements sont modernes.",
                        relativeTime: "il y a 2 semaines"
                    },
                    {
                        authorName: "Nadia T.",
                        authorInitial: "N",
                        rating: 5,
                        text: "Meilleur investissement de ma vie! Les entraîneurs sont passionnés et les infrastructures exceptionnelles.",
                        relativeTime: "il y a 3 semaines"
                    },
                    {
                        authorName: "Yacine D.",
                        authorInitial: "Y",
                        rating: 4,
                        text: "Très content des cours. Parfois un peu de monde aux heures de pointe mais ça reste gérable.",
                        relativeTime: "il y a 1 mois"
                    }
                ]
            };
        }

        // Auto-load reviews on page load
        window.addEventListener('load', loadReviews);

        // Auto-scroll carousel
        let autoScrollInterval = setInterval(() => {
            const track = document.getElementById('reviewsTrack');
            if (track && track.children.length > 0) {
                if (currentScroll >= track.scrollWidth - track.clientWidth) {
                    currentScroll = 0;
                } else {
                    currentScroll += 420;
                }
                track.scrollTo({
                    left: currentScroll,
                    behavior: 'smooth'
                });
            }
        }, 5000);

        // Pause auto-scroll on hover
        document.addEventListener('DOMContentLoaded', () => {
            const track = document.getElementById('reviewsTrack');
            if (track) {
                track.addEventListener('mouseenter', () => {
                    clearInterval(autoScrollInterval);
                });

                track.addEventListener('mouseleave', () => {
                    autoScrollInterval = setInterval(() => {
                        if (currentScroll >= track.scrollWidth - track.clientWidth) {
                            currentScroll = 0;
                        } else {
                            currentScroll += 420;
                        }
                        track.scrollTo({
                            left: currentScroll,
                            behavior: 'smooth'
                        });
                    }, 5000);
                });
            }
        });
    </script>
</body>
</html>
