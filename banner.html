<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AQA WEAR Banner</title>
<style>
    /* --- BANNER CSS --- */
    :root {
        --neon-blue: #00ffff;
        --deep-blue: #0099ff;
        --neon-green: #0f0; /* WhatsApp accent */
        --bg-dark: #050505;
        --font-tech: 'Courier New', Courier, monospace;
        --font-strong: 'Segoe UI', sans-serif;
    }

    /* The 1:1 Container */
    .aqa-banner-square {
        position: relative;
        width: 100%;
        max-width: 600px; /* Adjustable maximum size */
        aspect-ratio: 1 / 1;
        background-color: var(--bg-dark);
        overflow: hidden;
        font-family: var(--font-tech);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        border: 2px solid var(--neon-blue);
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }

    /* Background Effects (Grid & Overlay) */
    .banner-grid {
        position: absolute; inset: -50%;
        background-image: 
            linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 40px 40px;
        transform: perspective(500px) rotateX(60deg);
        animation: bannerGridMove 10s linear infinite;
        z-index: 1;
        opacity: 0.3;
    }
    .banner-crt {
        position: absolute; inset: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
        background-size: 100% 4px;
        z-index: 10; pointer-events: none;
    }
    @keyframes bannerGridMove {
        0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
        100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
    }

    /* Content Layer */
    .banner-content {
        position: relative;
        z-index: 5;
        padding: 2rem;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: radial-gradient(circle at center, rgba(0,20,30,0.4) 0%, rgba(5,5,5,0.9) 100%);
    }

    /* Header Section */
    .banner-header { margin-bottom: 1rem; }
    .banner-glitch-title {
        font-family: var(--font-strong);
        font-size: clamp(2.5rem, 8vw, 4rem);
        font-weight: 900;
        color: #fff;
        position: relative;
        text-transform: uppercase;
        letter-spacing: 3px;
        display: inline-block;
    }
    /* Reusing the glitch effect from your site */
    .banner-glitch-title::before, .banner-glitch-title::after {
        content: 'AQA WEAR'; position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
    }
    .banner-glitch-title::before { 
        color: var(--neon-blue); z-index: -1; animation: glitch 3s infinite; 
        clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); transform: translate(-2px); 
    }
    .banner-glitch-title::after { 
        color: var(--deep-blue); z-index: -2; animation: glitch 2.5s infinite reverse; 
        clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%); transform: translate(2px); 
    }
    .banner-subtitle {
        color: var(--neon-blue);
        letter-spacing: 2px;
        font-size: 1.2rem;
        margin-top: 0.5rem;
        text-shadow: 0 0 10px var(--neon-blue);
    }

    /* Middle "Locked" Visual */
    .locked-visual {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        border: 1px solid rgba(0, 255, 255, 0.2);
        margin: 1rem 0;
        background: rgba(0,0,0,0.5);
        overflow: hidden;
    }
    /* Placeholder image masked to look obscured */
    .locked-img-bg {
        position: absolute; inset: 0;
        /* Using one of your images blurred heavily */
        background-image: url('https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=800');
        background-size: cover;
        background-position: center;
        filter: blur(15px) grayscale(100%) brightness(0.3);
        opacity: 0.6;
    }
    .locked-overlay-text {
        position: relative; z-index: 2;
        color: #fff;
        border: 2px solid #fff;
        padding: 1rem 2rem;
        text-transform: uppercase;
        letter-spacing: 3px;
        background: rgba(0,0,0,0.8);
        display: flex; align-items: center; gap: 10px;
    }

    /* Footer / CTA Section */
    .banner-footer p {
        color: #ccc; font-size: 0.9rem; margin-bottom: 1.5rem; letter-spacing: 1px;
    }
    .wa-cta-btn {
        position: relative;
        display: flex; align-items: center; justify-content: center; gap: 10px;
        width: 100%;
        padding: 1.2rem;
        background: rgba(0, 20, 0, 0.9);
        border: 2px solid var(--neon-green);
        color: var(--neon-green);
        text-decoration: none;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 1rem;
        letter-spacing: 1px;
        overflow: hidden;
        transition: all 0.3s;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        font-family: var(--font-strong);
    }
    /* Green scanner line for the button */
    .wa-cta-btn::after {
        content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.4), transparent);
        animation: btnScan 3s infinite ease-in-out;
    }
    .wa-cta-btn:hover {
        background: var(--neon-green);
        color: #000;
        box-shadow: 0 0 30px var(--neon-green);
    }
    @keyframes btnScan {
        0% { left: -100%; } 100% { left: 200%; }
    }

    /* Resetting body margins just for this demo preview */
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #111; padding: 20px; }
</style>
</head>
